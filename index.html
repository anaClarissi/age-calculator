<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Age Calculator">
  <meta name="keywords" content="html, css, javascript">
  <meta name="author" content="Ana Clarissi">

  <!-- FONT POPPINS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,800;1,400;1,700;1,800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./src/assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Age calculator app</title>

  <link rel="stylesheet" href="./src/css/style.css">

</head>
<body>

  <main id="main">
    
    <div class="container">

      <header class="container--header">

        <form id="form" novalidate>

          <div class="form--content">

            <div class="col">

              <label for="day">Day</label>

              <input type="number" name="day" id="day" placeholder="DD" aria-labelledby="day-error-message" required>

              <p id="day-error-message" class="error-message" hidden></p>
              
            </div>

            <div class="col">

              <label for="month">Month</label>

              <input type="number" name="month" id="month" placeholder="MM" aria-labelledby="month-error-message" required>

              <p id="month-error-message" class="error-message" hidden></p>

            </div>

            <div class="col">

              <label for="year">Year</label>

              <input type="number" name="year" id="year" placeholder="yyyy" aria-labelledby="year-error-message" required>

              <p id="year-error-message" class="error-message" hidden></p>

            </div>

          </div>

          <button class="btn-submit" type="submit">

            <img src="./src/assets/images/icon-arrow.svg" alt="Arrow Icon" class="icon">

          </button>
          
        </form>

      </header>

      <div class="container--body">

        <p><span class="result-years">--</span> years</p>

        <p><span class="result-months">--</span> months</p>

        <p><span class="result-days">--</span> days</p>

      </div>

    </div>

  </main>
  
  <script src="./src/js/script.js"></script>

</body>
</html>
